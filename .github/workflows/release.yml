name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: lanscan-linux-x86_64
            use_cross: true
            make_packages: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: lanscan-linux-x86_64-musl
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: lanscan-linux-aarch64
            use_cross: true
            make_packages: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: lanscan-linux-aarch64-musl
            use_cross: true
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            name: lanscan-linux-armv7
            use_cross: true
            make_packages: true
          - target: arm-unknown-linux-gnueabihf
            os: ubuntu-latest
            name: lanscan-linux-armv6-hf
            use_cross: true
          - target: arm-unknown-linux-gnueabi
            os: ubuntu-latest
            name: lanscan-linux-armv6
            use_cross: true
          - target: armv5te-unknown-linux-gnueabi
            os: ubuntu-latest
            name: lanscan-linux-armv5
            use_cross: true
          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            name: lanscan-linux-armv7-musl
            use_cross: true
          - target: arm-unknown-linux-musleabihf
            os: ubuntu-latest
            name: lanscan-linux-armv6-musl
            use_cross: true
          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
            name: lanscan-linux-x86
            use_cross: true
            make_packages: true
          - target: i686-unknown-linux-musl
            os: ubuntu-latest
            name: lanscan-linux-x86-musl
            use_cross: true
          - target: riscv64gc-unknown-linux-gnu
            os: ubuntu-latest
            name: lanscan-linux-riscv64
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: lanscan-macos-x86_64
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            name: lanscan-macos-aarch64
            use_cross: false

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2
        if: matrix.use_cross
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        run: cp target/${{ matrix.target }}/release/lan ${{ matrix.name }}

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: ${{ matrix.name }}

      - name: Install cargo-deb and cargo-generate-rpm
        if: matrix.make_packages
        run: cargo install cargo-deb cargo-generate-rpm --locked

      - name: Build .deb
        if: matrix.make_packages
        run: cargo deb --target ${{ matrix.target }} --no-build --no-strip

      - name: Build .rpm
        if: matrix.make_packages
        run: cargo generate-rpm --target ${{ matrix.target }}

      - name: Upload packages
        if: matrix.make_packages
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            target/${{ matrix.target }}/debian/*.deb
            target/${{ matrix.target }}/generate-rpm/*.rpm

  pkgbuild:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up SSH for AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          printf 'Host aur.archlinux.org\n  IdentityFile ~/.ssh/aur\n  User aur\n' >> ~/.ssh/config
      - name: Generate PKGBUILD and .SRCINFO
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          BASEURL="https://github.com/goastler/lan-scan/releases/download/${TAG}"
          PKGDESC='LAN network scanner — discovers devices via ARP, optionally scans TCP/UDP ports'

          # Download each arch binary and compute checksums
          curl -sL "${BASEURL}/lanscan-linux-x86_64" -o bin-x86_64
          curl -sL "${BASEURL}/lanscan-linux-aarch64" -o bin-aarch64
          curl -sL "${BASEURL}/lanscan-linux-armv7"   -o bin-armv7h
          curl -sL "https://raw.githubusercontent.com/goastler/lan-scan/refs/tags/${TAG}/LICENSE" -o LICENSE_FILE

          SHA256_X86_64=$(sha256sum bin-x86_64    | cut -d' ' -f1)
          SHA256_AARCH64=$(sha256sum bin-aarch64  | cut -d' ' -f1)
          SHA256_ARMV7H=$(sha256sum bin-armv7h    | cut -d' ' -f1)
          SHA256_LICENSE=$(sha256sum LICENSE_FILE | cut -d' ' -f1)

          cat > PKGBUILD <<EOF
          # Maintainer: George Oastler <goastler4 at gmail dot com>
          pkgname=lanscan
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc='${PKGDESC}'
          arch=('x86_64' 'aarch64' 'armv7h')
          url='https://github.com/goastler/lan-scan'
          license=('AGPL-3.0-only')
          source=("LICENSE::https://raw.githubusercontent.com/goastler/lan-scan/refs/tags/v${VERSION}/LICENSE")
          source_x86_64=("lan::${BASEURL}/lanscan-linux-x86_64")
          source_aarch64=("lan::${BASEURL}/lanscan-linux-aarch64")
          source_armv7h=("lan::${BASEURL}/lanscan-linux-armv7")
          sha256sums=('${SHA256_LICENSE}')
          sha256sums_x86_64=('${SHA256_X86_64}')
          sha256sums_aarch64=('${SHA256_AARCH64}')
          sha256sums_armv7h=('${SHA256_ARMV7H}')

          package() {
              install -Dm755 "\${srcdir}/lan" "\${pkgdir}/usr/bin/lan"
              install -Dm644 "\${srcdir}/LICENSE" "\${pkgdir}/usr/share/licenses/\${pkgname}/LICENSE"
          }
          EOF

          cat > .SRCINFO <<EOF
          pkgbase = lanscan
          	pkgdesc = ${PKGDESC}
          	pkgver = ${VERSION}
          	pkgrel = 1
          	url = https://github.com/goastler/lan-scan
          	arch = x86_64
          	arch = aarch64
          	arch = armv7h
          	license = AGPL-3.0-only
          	source = LICENSE::https://raw.githubusercontent.com/goastler/lan-scan/refs/tags/v${VERSION}/LICENSE
          	sha256sums = ${SHA256_LICENSE}
          	source_x86_64 = lan::${BASEURL}/lanscan-linux-x86_64
          	sha256sums_x86_64 = ${SHA256_X86_64}
          	source_aarch64 = lan::${BASEURL}/lanscan-linux-aarch64
          	sha256sums_aarch64 = ${SHA256_AARCH64}
          	source_armv7h = lan::${BASEURL}/lanscan-linux-armv7
          	sha256sums_armv7h = ${SHA256_ARMV7H}

          pkgname = lanscan
          EOF
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            PKGBUILD
            .SRCINFO
      - name: Push to AUR
        run: |
          git clone ssh://aur@aur.archlinux.org/lanscan.git aur-repo
          cp PKGBUILD .SRCINFO aur-repo/
          cd aur-repo
          git config user.name "George Oastler"
          git config user.email "goastler4@gmail.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "update to ${{ github.ref_name }}"
          git push

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
