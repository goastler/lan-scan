name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: lanscan-linux-x86_64
            use_cross: true
            make_packages: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: lanscan-linux-x86_64-musl
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: lanscan-linux-aarch64
            use_cross: true
            make_packages: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: lanscan-linux-aarch64-musl
            use_cross: true
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            name: lanscan-linux-armv7
            use_cross: true
            make_packages: true
          - target: arm-unknown-linux-gnueabihf
            os: ubuntu-latest
            name: lanscan-linux-armv6-hf
            use_cross: true
          - target: arm-unknown-linux-gnueabi
            os: ubuntu-latest
            name: lanscan-linux-armv6
            use_cross: true
          - target: armv5te-unknown-linux-gnueabi
            os: ubuntu-latest
            name: lanscan-linux-armv5
            use_cross: true
          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            name: lanscan-linux-armv7-musl
            use_cross: true
          - target: arm-unknown-linux-musleabihf
            os: ubuntu-latest
            name: lanscan-linux-armv6-musl
            use_cross: true
          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
            name: lanscan-linux-x86
            use_cross: true
            make_packages: true
          - target: i686-unknown-linux-musl
            os: ubuntu-latest
            name: lanscan-linux-x86-musl
            use_cross: true
          - target: riscv64gc-unknown-linux-gnu
            os: ubuntu-latest
            name: lanscan-linux-riscv64
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: lanscan-macos-x86_64
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            name: lanscan-macos-aarch64
            use_cross: false

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2
        if: matrix.use_cross
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        run: cp target/${{ matrix.target }}/release/lan ${{ matrix.name }}

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: ${{ matrix.name }}

      - name: Install cargo-deb and cargo-generate-rpm
        if: matrix.make_packages
        run: cargo install cargo-deb cargo-generate-rpm --locked

      - name: Build .deb
        if: matrix.make_packages
        run: cargo deb --target ${{ matrix.target }} --no-build --no-strip

      - name: Build .rpm
        if: matrix.make_packages
        run: cargo generate-rpm --target ${{ matrix.target }}

      - name: Upload packages
        if: matrix.make_packages
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            target/${{ matrix.target }}/debian/*.deb
            target/${{ matrix.target }}/generate-rpm/*.rpm

  pkgbuild:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Generate PKGBUILD and .SRCINFO
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          URL="https://github.com/goastler/lan-scan/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          PKGDESC='LAN network scanner — discovers devices via ARP, optionally scans TCP/UDP ports'

          cat > PKGBUILD <<EOF
          # Maintainer: George Oastler <goastler4 at gmail dot com>
          pkgname=lanscan
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc='${PKGDESC}'
          arch=('x86_64' 'aarch64' 'armv7h')
          url='https://github.com/goastler/lan-scan'
          license=('AGPL-3.0-only')
          makedepends=('rust' 'cargo')
          source=("${pkgname}-${VERSION}.tar.gz::${URL}")
          sha256sums=('${SHA256}')

          build() {
              cd "lan-scan-${VERSION}"
              cargo build --release --locked
          }

          package() {
              cd "lan-scan-${VERSION}"
              install -Dm755 target/release/lan "\${pkgdir}/usr/bin/lan"
              install -Dm644 LICENSE "\${pkgdir}/usr/share/licenses/\${pkgname}/LICENSE"
              install -Dm644 README.md "\${pkgdir}/usr/share/doc/\${pkgname}/README.md"
          }
          EOF

          cat > .SRCINFO <<EOF
          pkgbase = lanscan
          	pkgdesc = ${PKGDESC}
          	pkgver = ${VERSION}
          	pkgrel = 1
          	url = https://github.com/goastler/lan-scan
          	arch = x86_64
          	arch = aarch64
          	arch = armv7h
          	license = AGPL-3.0-only
          	makedepends = rust
          	makedepends = cargo
          	source = lanscan-${VERSION}.tar.gz::${URL}
          	sha256sums = ${SHA256}

          pkgname = lanscan
          EOF
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: PKGBUILD

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
