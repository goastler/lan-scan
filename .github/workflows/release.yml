name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: lanscan-linux-x86_64
            use_cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: lanscan-linux-x86_64-musl
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: lanscan-linux-aarch64
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: lanscan-linux-aarch64-musl
            use_cross: true
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            name: lanscan-linux-armv7
            use_cross: true
          - target: arm-unknown-linux-gnueabihf
            os: ubuntu-latest
            name: lanscan-linux-armv6-hf
            use_cross: true
          - target: arm-unknown-linux-gnueabi
            os: ubuntu-latest
            name: lanscan-linux-armv6
            use_cross: true
          - target: armv5te-unknown-linux-gnueabi
            os: ubuntu-latest
            name: lanscan-linux-armv5
            use_cross: true
          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            name: lanscan-linux-armv7-musl
            use_cross: true
          - target: arm-unknown-linux-musleabihf
            os: ubuntu-latest
            name: lanscan-linux-armv6-musl
            use_cross: true
          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
            name: lanscan-linux-x86
            use_cross: true
          - target: i686-unknown-linux-musl
            os: ubuntu-latest
            name: lanscan-linux-x86-musl
            use_cross: true
          - target: riscv64gc-unknown-linux-gnu
            os: ubuntu-latest
            name: lanscan-linux-riscv64
            use_cross: true
          - target: mipsel-unknown-linux-gnu
            os: ubuntu-latest
            name: lanscan-linux-mipsel
            use_cross: true
          - target: mips-unknown-linux-gnu
            os: ubuntu-latest
            name: lanscan-linux-mips
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: lanscan-macos-x86_64
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            name: lanscan-macos-aarch64
            use_cross: false

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2
        if: matrix.use_cross
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        run: cp target/${{ matrix.target }}/release/lan ${{ matrix.name }}

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: ${{ matrix.name }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
